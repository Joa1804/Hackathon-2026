<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapas Ambientais — COMDEMA Digital</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- CSS do projeto -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    .page-wrap {
      max-width: 1400px;
      margin: auto;
      padding: 32px;
    }

    #map {
      height: 580px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--gray-200);
    }

    .map-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .map-btn {
      background: var(--gray-100);
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .map-btn.active {
      background: var(--mint-pale);
      color: var(--forest);
      border-color: var(--mint);
    }
  </style>
</head>

<body>

<header>
   <button  class="btn-logout" onclick="logout()" style="margin-left:16px;" class="btn-sm">
  🚪 Sair
</button>

<script>
  function logout() {
    localStorage.removeItem('userRole');
    window.location.href = 'login.html';
  }
</script>
  <strong>COMDEMA Digital</strong>
  <nav>
    <a href="index.html">Início</a>
    <a href="licenciamento.html">Licenciamento</a>
    <a href="mapas.html" class="active">Mapas</a>
    <a href="engajamento.html">Engajamento</a>
    <a href="coi.html">COI Ambiental</a>
  </nav>
</header>

<main class="page-wrap">

  <h1 class="section-title">Mapas Ambientais</h1>
  <p class="section-sub">
    Clique no mapa para registrar uma denúncia ambiental.
  </p>

  <!-- Toolbar -->
  <div class="map-toolbar">
    <button class="map-btn active">Todas</button>
    <button class="map-btn">Resíduos</button>
    <button class="map-btn">Poda</button>
    <button class="map-btn">Urgente</button>
    <button class="map-btn">Resolvidas</button>
  </div>

  <!-- Map -->
  <div id="map"></div>

</main>

<footer>
  COMDEMA Digital · Módulo de Mapas Ambientais
</footer>

<script>
  if (localStorage.getItem('userRole') !== 'cidadao') {
    alert('Área exclusiva para cidadãos.');
    window.location.href = 'login.html';
  }
</script>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
  // Inicializa o mapa (Indaiatuba)
  const map = L.map('map').setView([-23.0906, -47.2183], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Marcadores mockados (visual)
  const reports = [
    { lat: -23.088, lng: -47.222, text: '🗑️ Entulho irregular — Rua das Flores' },
    { lat: -23.095, lng: -47.210, text: '🌿 Poda irregular — Av. Brasil' },
    { lat: -23.083, lng: -47.230, text: '🏭 Resíduo industrial — Bairro Industrial' },
    { lat: -23.100, lng: -47.205, text: '✅ Denúncia resolvida — Jardim Europa' }
  ];

  reports.forEach(r => {
    L.marker([r.lat, r.lng])
      .addTo(map)
      .bindPopup(r.text);
  });

  // ===== CRIAR DENÚNCIA NO CLIQUE =====
  map.on('click', e => {
    const { lat, lng } = e.latlng;

    if (!confirm('Deseja registrar uma denúncia neste local?')) return;

    const denuncia = {
      id: `den-${Date.now()}`,
      title: 'Denúncia ambiental',
      tipo: 'Denúncia via mapa',
      status: 'recebido',
      prazo: '',
      responsavel: '',
      prioridade: 'Normal',
      localizacao: `${lat.toFixed(5)}, ${lng.toFixed(5)}`,
      data: new Date().toLocaleDateString('pt-BR')
    };

    const pendentes =
      JSON.parse(localStorage.getItem('denunciasPendentes')) || [];

    pendentes.push(denuncia);
    localStorage.setItem('denunciasPendentes', JSON.stringify(pendentes));

    L.marker([lat, lng])
      .addTo(map)
      .bindPopup('📍 Denúncia registrada')
      .openPopup();

    alert('✅ Denúncia registrada! Ela aparecerá no Licenciamento.');
  });
</script>

</body>
</html>
